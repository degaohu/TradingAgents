name = "tradingagents-job-room"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Migrations required so wrangler knows this is a DO-hosting script.
[[migrations]]
tag = "v1"
new_classes = ["JobRoom"]

[durable_objects]
bindings = []   # this script hosts the class; consumers bind to it

# When someone hits this worker's default fetch, we always 404 — the
# DO is only reached via bindings from the API worker.
