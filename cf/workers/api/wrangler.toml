name = "tradingagents-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Custom route (optional) — omit to use *.workers.dev
# routes = [{ pattern = "api.tradingagents.example.com/*", zone_name = "example.com" }]

[[d1_databases]]
binding = "DB"
database_name = "tradingagents-db"
database_id = "REPLACE_ME_WITH_wrangler_d1_create_OUTPUT"

[[r2_buckets]]
binding = "REPORTS"
bucket_name = "tradingagents-reports"

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_ME"

[[durable_objects.bindings]]
name = "JOB_ROOMS"
class_name = "JobRoom"
script_name = "tradingagents-job-room"

# ── Vars (non-secret) ──────────────────────────────────────
[vars]
ACCESS_TEAM_DOMAIN = "your-team.cloudflareaccess.com"
ACCESS_AUD = "REPLACE_WITH_ACCESS_APPLICATION_AUD_TAG"
FREE_QUOTA_INITIAL = "5"
STRIPE_ENABLED = "false"                # flip to "true" once Stripe is wired

# ── Secrets (set with: wrangler secret put NAME) ───────────
#   CF_INTERNAL_TOKEN       HMAC shared secret with the VPS worker
#   R2_ACCOUNT_ID           for presigned URLs (S3-compatible signing)
#   R2_ACCESS_KEY_ID        (create in R2 dashboard → Manage API tokens)
#   R2_SECRET_ACCESS_KEY
#   STRIPE_SECRET_KEY       (only when STRIPE_ENABLED=true)
#   STRIPE_WEBHOOK_SECRET
